name: Validate

on:
  push:
    branches:
      - main
      - master
      - work
  pull_request:

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prepare CI logs dir
        run: mkdir -p .ci-logs

      - name: Run tests
        run: |
          set -o pipefail
          npm test -- --runInBand 2>&1 | tee .ci-logs/test.log

      - name: Build app
        run: |
          set -o pipefail
          npm run build 2>&1 | tee .ci-logs/build.log

      - name: Packaging preflight (static)
        run: |
          set -o pipefail
          npm run packaging:check 2>&1 | tee .ci-logs/packaging-check.log

      - name: Upload validate logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-linux-logs
          path: .ci-logs/
          if-no-files-found: ignore

      - name: Job summary (linux)
        if: always()
        run: |
          {
            echo "## Validate Linux summary"
            echo "- Blocking job: **yes**"
            echo "- Steps: install, test, build, packaging preflight"
            echo "- Logs artifact on failure: \`validate-linux-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"

  validate-windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 30
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build smoke (renderer + electron)
        run: npm run build

      - name: Job summary (windows smoke)
        if: always()
        run: |
          {
            echo "## Validate Windows smoke summary"
            echo "- Blocking job: **no** (continue-on-error)"
            echo "- Purpose: cross-platform early signal for build regressions"
          } >> "$env:GITHUB_STEP_SUMMARY"
