name: Packaging Preflight

on:
  pull_request:
    paths:
      - 'package.json'
      - 'scripts/packaging/**'
      - 'build/installer.nsh'
      - 'resources/**'
      - '.github/workflows/packaging-preflight.yml'
  workflow_dispatch:

concurrency:
  group: packaging-preflight-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  packaging-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prepare CI logs dir
        run: mkdir -p .ci-logs

      - name: Build app (required for packaging checks)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee .ci-logs/build.log

      - name: Run packaging static checks
        run: |
          set -o pipefail
          npm run packaging:check 2>&1 | tee .ci-logs/packaging-check.log

      - name: Upload packaging-check logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: packaging-check-logs
          path: .ci-logs/
          if-no-files-found: ignore

      - name: Job summary (packaging-check)
        if: always()
        run: |
          {
            echo "## Packaging check summary"
            echo "- Blocking when triggered: **yes**"
            echo "- Trigger: packaging-related PR changes or manual dispatch"
            echo "- Logs artifact on failure: \`packaging-check-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"

  packaging-validate-dir:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Prepare CI logs dir
        run: mkdir -p .ci-logs

      - name: Build app (required for packaging target validation)
        run: |
          set -o pipefail
          npm run build 2>&1 | tee .ci-logs/build.log

      - name: Run packaging target validation (dir)
        run: |
          set -o pipefail
          npm run packaging:validate:dir 2>&1 | tee .ci-logs/packaging-validate-dir.log

      - name: Upload packaging validate-dir logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaging-validate-dir-logs
          path: .ci-logs/
          if-no-files-found: ignore

      - name: Job summary (packaging-validate-dir)
        if: always()
        run: |
          {
            echo "## Packaging validate-dir summary"
            echo "- Blocking: **manual-only job**"
            echo "- Trigger: workflow_dispatch"
            echo "- Logs artifact: \`packaging-validate-dir-logs\`"
          } >> "$GITHUB_STEP_SUMMARY"
